name: ${name}
version: ${version}
main: devgbx9.mineflayer.MineflayerPlugin
api-version: ${minecraft_version}
author: DevGBX9

commands:
  mineflayer:
    description: Mineflayer plugin commands
    usage: /<command> add <name> | /<command> delete <name>
    permission: mineflayer.use

permissions:
  mineflayer.use:
    description: Allows using Mineflayer commands
    default: true
